name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (lightweight, no TensorFlow)
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest numpy pandas scipy scikit-learn networkx requests pyarrow
          pip install -e . --no-deps
      - name: Ruff
        run: ruff check src tests
      - name: Pytest
        run: pytest -q
