services:
  # Streamlit dashboard
  meta-analysis-engine:
    build: .
    container_name: proteomics_engine
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./Meta_Analysis_Results:/app/Meta_Analysis_Results
    environment:
      - SQLITE_DB_PATH=/app/data/meta_analysis.db
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      - ollama

  # Local LLM server for the chatbot tab
  ollama:
    image: ollama/ollama:latest
    container_name: proteomics_ollama
    ports:
      - "11434:11434"
    volumes:
      - ./ollama_data:/root/.ollama

  # One-shot: pull the LLaMA 3 model on startup
  ollama-init:
    image: curlimages/curl:latest
    container_name: proteomics_ollama_init
    depends_on:
      - ollama
    command: >
      sh -c "sleep 5 && curl -X POST http://ollama:11434/api/pull -d '{\"name\": \"llama3\"}'"
